<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guessing-game</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
    <link rel="icon" href="./images/guess.png">
</head>
<body>
    <img src="./images/redguess.png" alt="Guessing Game Icon" class="game-icon" height="40px" width="40px">
    <h1>Number Guessing Game</h1>
    <p>Guess a number between 1 to 10</p>
    <input type="number" id="guessInput" min="1" max="10"><br><br>
    <button id="guessButton">Submit Guess</button>
    <p id="result"></p>
    <button id="playAgainButton" style="display:none;">Play Again</button>
</body>
</html>
